<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>울림 - 의류 수거 예약하기</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; }
        body { background-color: #f5f6f7; color: #333; padding-bottom: 60px; }
        
        /* 네이버 감성 상단 바 */
        .naver-header { background-color: #fff; border-bottom: 1px solid #e2e4e7; position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; height: 56px; display: flex; align-items: center; padding: 0 20px; }
        .back-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #333; margin-right: 15px; text-decoration: none; }
        .header-title { font-size: 18px; font-weight: bold; color: #115c32; }

        .container { max-width: 600px; margin: 76px auto 20px auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 25px; }
        .page-desc { font-size: 14px; color: #666; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px dashed #e2e4e7; }
        
        /* 세션 타이틀 */
        .sub-title { font-size: 16px; font-weight: bold; margin: 20px 0 10px 0; color: #115c32; display: flex; align-items: center; gap: 6px; }
        
        /* 수거 방식 라디오 버튼 스타일 */
        .type-container { display: flex; gap: 12px; margin-bottom: 20px; }
        .type-box { flex: 1; position: relative; }
        .type-box input[type="radio"] { display: none; }
        .type-label { display: block; background: #fff; border: 1px solid #ccc; border-radius: 8px; padding: 15px; text-align: center; cursor: pointer; font-weight: 600; font-size: 14px; transition: all 0.2s; }
        .type-box input[type="radio"]:checked + .type-label { border-color: #4bb543; background-color: #f4f9f4; color: #115c32; box-shadow: 0 0 0 1px #4bb543; }

        /* 입력 폼 스타일 */
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: #444; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; background-color: #fff; }
        .form-control:focus { border-color: #4bb543; outline: none; }

        /* 간단 달력 스타일 (네이버 예약 느낌) */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; background: #fff; border: 1px solid #e2e4e7; border-radius: 8px; padding: 15px; text-align: center; }
        .cal-header { font-weight: bold; font-size: 12px; color: #777; padding-bottom: 10px; }
        .cal-day { padding: 10px 0; border-radius: 5px; font-size: 14px; cursor: pointer; font-weight: 500; }
        .cal-day:hover:not(.disabled) { background-color: #eee; }
        .cal-day.disabled { color: #ccc; cursor: not-allowed; }
        .cal-day.selected { background-color: #115c32 !important; color: #fff !important; font-weight: bold; }
        .sunday { color: #d9534f; }
        .saturday { color: #0275d8; }

        /* 하단 예약 버튼 */
        .submit-btn { width: 100%; background-color: #115c32; color: #fff; border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 30px; transition: background-color 0.2s; }
        .submit-btn:hover { background-color: #0b3d21; }
    </style>
</head>
<body>

    <div class="naver-header">
        <a href="servicepage.html" class="back-btn"> can </a>
        <div class="header-title">울림 의류수거 예약</div>
    </div>

    <div class="container">
        <p class="page-desc">정리하실 옷을 문 앞에 두고 신청해 주시면, 안전하고 스마트하게 수거 및 정산을 도와드립니다.</p>
        
        <form id="reserveForm" onsubmit="handleReserve(event)">
            
            <div class="sub-title">🟢 1. 수거 방식 선택</div>
            <div class="type-container">
                <div class="type-box">
                    <input type="radio" id="type1" name="pickupType" value="울림 픽업 (비대면)" checked>
                    <label for="type1" class="type-label">🚚 울림 픽업<br><span style="font-size:11px; font-weight:normal; color:#666;">서울/경기 일부 자체 수거</span></label>
                </div>
                <div class="type-box">
                    <input type="radio" id="type2" name="pickupType" value="전국 택배 수거">
                    <label for="type2" class="type-label">📦 택배 수거<br><span style="font-size:11px; font-weight:normal; color:#666;">전국 어디서나 키트 회수</span></label>
                </div>
            </div>

            <div class="sub-title">📅 2. 수거 희망일 선택 (5월)</div>
            <div class="calendar-grid">
                <div class="cal-header sunday">일</div><div class="cal-header">월</div><div class="cal-header">화</div><div class="cal-header">수</div><div class="cal-header">목</div><div class="cal-header">금</div><div class="cal-header saturday">토</div>
                
                <div class="cal-day disabled"></div><div class="cal-day disabled"></div><div class="cal-day disabled"></div><div class="cal-day disabled"></div><div class="cal-day disabled">1</div><div class="cal-day disabled">2</div><div class="cal-day disabled">3</div>
                <div class="cal-day disabled">4</div><div class="cal-day disabled">5</div><div class="cal-day disabled">6</div><div class="cal-day disabled">7</div><div class="cal-day disabled">8</div><div class="cal-day disabled">9</div><div class="cal-day disabled">10</div>
                <div class="cal-day disabled">11</div><div class="cal-day disabled">12</div><div class="cal-day disabled">13</div><div class="cal-day disabled">14</div><div class="cal-day disabled">15</div><div class="cal-day disabled">16</div><div class="cal-day disabled">17</div>
                <div class="cal-day disabled">18</div><div class="cal-day disabled">19</div><div class="cal-day disabled">20</div><div class="cal-day disabled">21</div>
                <div class="cal-day" onclick="selectDate(this, '5월 22일')">22</div>
                <div class="cal-day saturday" onclick="selectDate(this, '5월 23일')">23</div>
                <div class="cal-day sunday" onclick="selectDate(this, '5월 24일')">24</div>
                <div class="cal-day" onclick="selectDate(this, '5월 25일')">25</div><div class="cal-day" onclick="selectDate(this, '5월 26일')">26</div><div class="cal-day" onclick="selectDate(this, '5월 27일')">27</div><div class="cal-day" onclick="selectDate(this, '5월 28일')">28</div><div class="cal-day" onclick="selectDate(this, '5월 29일')">29</div><div class="cal-day saturday" onclick="selectDate(this, '5월 30일')">30</div><div class="cal-day sunday" onclick="selectDate(this, '5월 31일')">31</div>
            </div>
            <input type="hidden" id="selectedDate" required>

            <div class="sub-title">📝 3. 예약자 정보 입력</div>
            <div class="form-group">
                <label for="userName">신청인 이름</label>
                <input type="text" id="userName" class="form-control" placeholder="이름을 입력해 주세요" required>
            </div>
            <div class="form-group">
                <label for="userPhone">연락처</label>
                <input type="tel" id="userPhone" class="form-control" placeholder="010-0000-0000" required>
            </div>
            <div class="form-group">
                <label for="userAddress">수거 주소</label>
                <input type="text" id="userAddress" class="form-control" placeholder="상세 주소까지 입력해 주세요" required>
            </div>
            <div class="form-group">
                <label for="userMemo">수거 요청사항 (선택)</label>
                <input type="text" id="userMemo" class="form-control" placeholder="예: 문 앞 벨 x, 경비실에 맡김 등">
            </div>

            <button type="submit" class="submit-btn">예약 신청 완료하기</button>
        </form>
    </div>

    <script>
        // 날짜 선택 기능
        function selectDate(element, dateStr) {
            // 기존 선택된 날짜 초기화
            const activeDays = document.querySelectorAll('.cal-day.selected');
            activeDays.forEach(day => day.classList.remove('selected'));
            
            // 새 날짜 선택
            element.classList.add('selected');
            document.getElementById('selectedDate').value = dateStr;
        }

        // 예약 완료 팝업 알림 효과
        function handleReserve(event) {
            event.preventDefault();
            
            const date = document.getElementById('selectedDate').value;
            if(!date) {
                alert('📅 수거 희망 날짜를 달력에서 선택해 주세요!');
                return;
            }

            const name = document.getElementById('userName').value;
            const type = document.querySelector('input[name="pickupType"]:checked').value;

            alert(`🎉 네이버 예약 신청이 정상 접수되었습니다!\n\n• 신청자: ${name}님\n• 수거 방식: ${type}\n• 확정 날짜: ${date}\n\n입력하신 주소로 수거 안내 카카오톡이 발송됩니다.`);
            
            // 예약 완료 후 메인 화면(index.html)으로 이동
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
